services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: etl-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Flask Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: etl-web:latest
    container_name: etl-web
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_PORT: ${APP_PORT:-5333}
      FLASK_DEBUG: 0  # Production mode
    ports:
      - "${APP_PORT:-5333}:${APP_PORT:-5333}"
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etl-network
    restart: unless-stopped  # Tự động restart nếu container bị stop
    stdin_open: true         # Keep stdin open
    tty: true                # Allocate pseudo-TTY để container chạy mãi

volumes:
  postgres_data:
    driver: local

networks:
  etl-network:
    driver: bridge
