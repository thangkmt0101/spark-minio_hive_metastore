services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: etl-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Flask Web Application
  etl-web:
    image: etl-web:latest
    environment:
      APP_PORT: ${APP_PORT:-5333}
    ports:
      - "${APP_PORT:-5333}:5333"
    container_name: etl-web
    networks:
      - app-network            # Allocate pseudo-TTY để container chạy mãi

volumes:
  postgres_data:
    driver: local

networks:
  etl-network:
    driver: bridge
