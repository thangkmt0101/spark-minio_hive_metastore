x-kafka-security:
  plaintext: &kafka_plaintext_env
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
    KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_SASL_ENABLED_MECHANISMS: ""
    KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: ""
    KAFKA_AUTHORIZER_CLASS_NAME: ""
    KAFKA_SUPER_USERS: ""
  sasl_scram: &kafka_sasl_env
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
    KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
    KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
    KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
    KAFKA_SUPER_USERS: User:ANONYMOUS;User:admin

x-schema-registry-security:
  plaintext: &schema_plaintext_env
    SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: ""
    SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: ""
  sasl_scram: &schema_sasl_env
    SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: SCRAM-SHA-256
    SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";

x-kafka-ui-security:
  plaintext: &kafka_ui_plaintext_env
    KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
    KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: ""
    KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: ""
  sasl_scram: &kafka_ui_sasl_env
    KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
    KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-256
    KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"admin\" password=\"admin-secret\";"

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      <<: *kafka_sasl_env
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JVM_PERFORMANCE_OPTS: -Djava.security.auth.login.config=/etc/kafka/jaas.conf
      KAFKA_LOG4J_LOGGERS: kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO
      CLUSTER_ID: ZmFzdC1kYXRhLXBsdWdpbg
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/jaas.conf:/etc/kafka/jaas.conf:ro
      - ./kafka/client.properties:/etc/kafka/client.properties:ro
    command:
      - bash
      - -c
      - |
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[k]afka.Kafka' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  kafka-init-user:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-init-user
    volumes:
      - ./kafka/client.properties:/etc/kafka/client.properties:ro
      - ./kafka/init-kafka.sh:/init-kafka.sh:ro
    entrypoint: ["/bin/bash", "/init-kafka.sh"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    profiles:
      - optional

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8082:8080"
    environment:
      <<: *kafka_ui_sasl_env
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      <<: *schema_sasl_env
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/sbin/start-master.sh
    working_dir: /opt/spark
    networks:
      - app-network

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=8g
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      - spark-master
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    working_dir: /opt/spark
    networks:
      - app-network

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://csdlgt/iceberg-warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_ACCESS_KEY_ID=minioadmin
      - CATALOG_S3_SECRET_ACCESS_KEY=minioadmin
      - CATALOG_S3_REGION=us-east-1
    depends_on:
      - minio
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8181/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  trino:
    image: trinodb/trino:latest
    container_name: trino
    ports:
      - "8090:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config.properties:/etc/trino/config.properties
    depends_on:
      - iceberg-rest
      - minio
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nifi:
    image: apache/nifi:2.6.0
    container_name: nifi
    ports:
      - "8444:8444"
    environment:
      - NIFI_WEB_HTTPS_PORT=8444
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=admin
    volumes:
      - ./nifi:/opt/nifi
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  kafka_data:
