services:
  oracle-sync:
    build: .
    container_name: oracle-sync-app
    ports:
      # HOST_PORT:CONTAINER_PORT — đổi HOST_PORT trong file .env
      - "${HOST_PORT:-5000}:5000"
    environment:
      - PYTHONPATH=/app
      - LARGE_TABLE_THRESHOLD=${LARGE_TABLE_THRESHOLD:-100000}
    volumes:
      # Dữ liệu folder scripts (XML, CSV) lưu trong container volume, không dùng folder host
      - scripts_data:/app/scripts
    restart: unless-stopped

volumes:
  scripts_data:
